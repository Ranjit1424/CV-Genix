spring.application.name=Create-Resume

# Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
server.port=8081

# AI Configuration
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=llama3.1
spring.ai.ollama.chat.options.temperature=0.2
spring.ai.ollama.chat.options.top-k=40
spring.ai.ollama.chat.options.top-p=0.9
spring.ai.ollama.chat.options.num-predict=256

# Optional external API for interview question generation (OpenAI-compatible chat completions endpoint).
# If enabled and configured, interview questions are generated using this API first,
# then Llama is still used to fill any missing answers.
app.interview.external-api.enabled=false
app.interview.external-api.url=
app.interview.external-api.key=
app.interview.external-api.model=
app.interview.external-api.temperature=0.8

# CORS (frontend dev servers)
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174

# Live jobs feed
app.jobs.api.base-url=https://remotive.com/api/remote-jobs
app.jobs.linkedin-search.url=https://jsearch.p.rapidapi.com/search
app.jobs.linkedin-search.api-key=${JSEARCH_API_KEY:}
app.jobs.linkedin-search.api-host=jsearch.p.rapidapi.com
app.jobs.exclude-keywords=mitre media,jobs@mitremedia.com
